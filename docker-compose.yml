version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: transitops-db
    environment:
      POSTGRES_USER: ${DB_USER:-transit_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-transit_pass}
      POSTGRES_DB: transitops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
